<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KaraokeQuest: FL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="loginScreen" class="login-screen" aria-label="KaraokeQuest login">
      <div class="login-curtain" aria-hidden="true"></div>
      <section class="login-panel" aria-labelledby="loginTitle">
        <h1 id="loginTitle">KaraokeQuest: FL</h1>
        <form id="loginForm" class="login-form" autocomplete="on">
          <label for="username">Login</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
          <button type="submit">Enter Quest</button>
          <p id="loginError" class="form-error" role="alert"></p>
        </form>
      </section>
    </main>

    <main id="appScreen" class="app-shell hidden" aria-label="KaraokeQuest application">
      <header class="top-bar">
        <div class="app-title">
          <span>KaraokeQuest: FL</span>
        </div>
        <nav class="view-tabs" aria-label="Primary">
          <button id="mapTab" class="tab-button active" type="button" data-view="map">Map</button>
          <button id="ledgerTab" class="tab-button" type="button" data-view="ledger">Ledger</button>
          <button id="alcoholTab" class="tab-button" type="button" data-view="alcohol">Alcohol</button>
        </nav>
        <button id="logoutButton" class="ghost-button" type="button">Logout</button>
      </header>

      <section id="mapView" class="view map-view" aria-label="Florida karaoke map">
        <div id="mapBoard" class="map-board" tabindex="0" aria-label="Real map of Florida"></div>

        <aside class="map-tools" aria-label="Pin controls">
          <div>
            <p class="kicker">Florida</p>
            <h2>Karaoke Map</h2>
          </div>
          <form id="locationSearchForm" class="location-search">
            <label for="locationSearch">Location finder</label>
            <div class="search-row">
              <input id="locationSearch" name="locationSearch" type="search" placeholder="Venue or address">
              <button id="locationSearchButton" class="secondary-button" type="submit">Find</button>
            </div>
            <p id="locationSearchStatus" class="search-status" role="status"></p>
          </form>
          <button id="dropPinButton" class="primary-button" type="button">Drop Pin</button>
          <button id="clearPinsButton" class="secondary-button" type="button">Clear Pins</button>
        </aside>
      </section>

      <section id="ledgerView" class="view ledger-view hidden" aria-labelledby="ledgerTitle">
        <div class="ledger-heading">
          <div>
            <p class="kicker">Quest Records</p>
            <h2 id="ledgerTitle">Ledger</h2>
          </div>
          <button id="ledgerDropPinButton" class="primary-button" type="button">Drop Pin</button>
        </div>
        <div id="ledgerList" class="ledger-list" aria-live="polite"></div>
      </section>

      <section id="alcoholView" class="view alcohol-view hidden" aria-labelledby="alcoholScaleTitle">
        <div class="ledger-heading">
          <div>
            <p class="kicker">Confirmed Offers</p>
            <h2 id="alcoholScaleTitle">Alcohol Scale</h2>
          </div>
          <button id="alcoholDropPinButton" class="primary-button" type="button">Drop Pin</button>
        </div>
        <div class="alcohol-scale-wrap">
          <div class="scale-axis" aria-hidden="true">
            <span>Less expensive</span>
            <span>More expensive</span>
          </div>
          <div id="alcoholScaleList" class="alcohol-scale-list" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <dialog id="pinDialog" class="pin-dialog">
      <form id="pinForm" method="dialog">
        <div class="dialog-heading">
          <p class="kicker">New Location</p>
          <h2>Ledger Entry</h2>
        </div>
        <label for="locationName">Location name</label>
        <input id="locationName" name="locationName" type="text" maxlength="80" required>
        <label for="locationDescription">Description</label>
        <textarea id="locationDescription" name="locationDescription" rows="4" maxlength="260" required></textarea>
        <fieldset class="alcohol-fieldset">
          <legend>Alcohol Pricing</legend>
          <label class="check-row" for="alcoholConfirmed">
            <input id="alcoholConfirmed" name="alcoholConfirmed" type="checkbox">
            <span>Alcohol for sale confirmed</span>
          </label>
          <div class="price-range-grid">
            <label for="alcoholLow">
              <span>Low price</span>
              <input id="alcoholLow" name="alcoholLow" type="number" min="0" step="0.50" inputmode="decimal" placeholder="$">
            </label>
            <label for="alcoholHigh">
              <span>High price</span>
              <input id="alcoholHigh" name="alcoholHigh" type="number" min="0" step="0.50" inputmode="decimal" placeholder="$">
            </label>
          </div>
        </fieldset>
        <p id="pinCoordinates" class="coordinate-preview"></p>
        <menu class="dialog-actions">
          <button id="cancelPinButton" class="secondary-button" type="button">Cancel</button>
          <button class="primary-button" type="submit">Save Pin</button>
        </menu>
      </form>
    </dialog>

    <dialog id="reviseDialog" class="pin-dialog">
      <form id="reviseForm" method="dialog">
        <div class="dialog-heading">
          <p class="kicker">Revise Notes</p>
          <h2>Ledger Entry</h2>
        </div>
        <p id="reviseLocationName" class="revision-target"></p>
        <label for="reviseDescription">Description</label>
        <textarea id="reviseDescription" name="reviseDescription" rows="5" maxlength="260" required></textarea>
        <fieldset class="alcohol-fieldset">
          <legend>Alcohol Pricing</legend>
          <label class="check-row" for="reviseAlcoholConfirmed">
            <input id="reviseAlcoholConfirmed" name="reviseAlcoholConfirmed" type="checkbox">
            <span>Alcohol for sale confirmed</span>
          </label>
          <div class="price-range-grid">
            <label for="reviseAlcoholLow">
              <span>Low price</span>
              <input id="reviseAlcoholLow" name="reviseAlcoholLow" type="number" min="0" step="0.50" inputmode="decimal" placeholder="$">
            </label>
            <label for="reviseAlcoholHigh">
              <span>High price</span>
              <input id="reviseAlcoholHigh" name="reviseAlcoholHigh" type="number" min="0" step="0.50" inputmode="decimal" placeholder="$">
            </label>
          </div>
        </fieldset>
        <p id="reviseCoordinates" class="coordinate-preview"></p>
        <menu class="dialog-actions">
          <button id="cancelReviseButton" class="secondary-button" type="button">Cancel</button>
          <button class="primary-button" type="submit">Save Revision</button>
        </menu>
      </form>
    </dialog>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
